<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Portofolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center px-4">

    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md space-y-6">
        <div class="text-center space-y-2">
            <h2 class="text-2xl font-bold text-gray-900">Login Administrator</h2>
            <p class="text-sm text-gray-500">Silakan masuk untuk mengelola data portofolio</p>
        </div>

        <div class="space-y-4">
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Username</label>
                <input type="text" id="username" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:outline-indigo-500 text-sm" placeholder="Masukkan username admin">
            </div>
            <div class="space-y-1">
                <label class="text-sm font-semibold text-gray-700">Password</label>
                <div class="relative flex items-center">
                    <input type="password" id="password" class="w-full pl-4 pr-11 py-2.5 border border-gray-300 rounded-xl focus:outline-indigo-500 text-sm" placeholder="••••••••">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3.5 text-gray-400 hover:text-gray-600 transition-colors cursor-pointer p-1">
                        <i id="ikon-mata" class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            
            <button onclick="prosesLogin()" class="w-full mt-2 py-3 bg-indigo-600 text-white font-medium rounded-xl text-sm hover:bg-indigo-700 transition shadow-xs">
                Masuk ke Panel Admin
            </button>
        </div>

        <div class="text-center">
            <a href="index.html" class="text-xs text-gray-400 hover:text-indigo-600 transition">&larr; Kembali ke Beranda</a>
        </div>
    </div>

    <script>
        // TAMBAHAN: Fungsi interaktif untuk menyembunyikan/memperlihatkan password
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('ikon-mata');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.replace('fa-eye', 'fa-eye-slash'); // Ganti jadi mata dicoret
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.replace('fa-eye-slash', 'fa-eye'); // Kembali jadi mata normal
            }
        }

        async function prosesLogin() {
            const usernameInput = document.getElementById('username').value;
            const passwordInput = document.getElementById('password').value;

            if (!usernameInput || !passwordInput) {
                alert("Username dan password tidak boleh kosong!");
                return;
            }

            try {
                // Menembak API login backend kita di port 5000
                const respon = await fetch('http://127.0.0.1:5000/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: usernameInput, 
                        password: passwordInput 
                    })
                });

                const hasil = await respon.json();

                if (hasil.status === 'sukses') {
                    alert("Login Berhasil! Mengalihkan ke panel admin...");
                    // Pindah otomatis ke halaman dashboard admin jika sukses
                    window.location.href = '/admin/dashboard';
                } else {
                    alert("Gagal Login: " + hasil.pesan);
                }
            } catch (error) {
                console.error(error);
                alert("Gagal terhubung ke server backend Flask.");
            }
        }
    </script>
</body>
</html>
