<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kelola Skills - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="/admin/css/skills.css">
</head>
<body class="bg-slate-50 flex">
    <div class="w-64 bg-slate-900 text-slate-300 p-6 flex flex-col space-y-2 h-screen sticky top-0">
        <h2 class="text-white text-xl font-bold mb-6">Panel Admin</h2>
        <a href="/admin/dashboard" class="px-4 py-2 rounded hover:bg-slate-800">Dashboard</a>
        <a href="/admin/profiles" class="px-4 py-2 rounded hover:bg-slate-800">Profil</a>
        <a href="/admin/skills" class="px-4 py-2 bg-blue-600 rounded text-white font-medium">Skills</a>
        <a href="/admin/experience" class="px-4 py-2 rounded hover:bg-slate-800">Experience</a>
        <a href="/admin/projects" class="px-4 py-2 rounded hover:bg-slate-800">Projects</a>
        <hr class="border-slate-700 my-4">
        <a href="/" class="text-xs text-slate-400 hover:text-white">← Lihat Website Utama</a>
    </div>

    <div class="flex-1 p-10 max-w-3xl space-y-6">
        <h1 class="text-3xl font-bold text-slate-800">Kelola Keahlian (Skills)</h1>
        
        <div class="bg-white p-6 rounded-2xl border border-slate-200/60 shadow-sm space-y-4">
            <h3 class="text-lg font-semibold text-slate-700">Tambah Skill Baru</h3>
            <div class="flex gap-4">
                <input type="text" id="input-skill" placeholder="Contoh: Java, Python, Tailwind CSS" class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-slate-800">
                <button onclick="tambahSkill()" class="px-6 py-2.5 bg-blue-600 text-white font-medium rounded-xl hover:bg-blue-700 transition-colors">Tambah</button>
            </div>
        </div>
    </div>

    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/skills.js"></script>
</body>
</html>
