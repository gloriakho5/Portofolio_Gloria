<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Keahlian (Skills) - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#fffafb] flex min-h-screen overflow-hidden">

    <div class="w-64 bg-slate-900 text-slate-300 p-6 flex flex-col space-y-2 h-screen sticky top-0 shadow-xl shrink-0">
        <h2 class="text-white text-xl font-bold mb-6 flex items-center gap-2">
            <i class="fa-solid fa-sliders text-pink-500"></i> Panel Admin
        </h2>
        <nav class="flex flex-col space-y-2 font-medium text-sm">
            <a href="/admin/dashboard" class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                <i class="fa-solid fa-chart-pie w-5"></i> Dashboard
            </a>
            <a href="/admin/profile" class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                <i class="fa-solid fa-user w-5"></i> Profil
            </a>
            <a href="/admin/skills" class="flex items-center gap-3 px-4 py-3 bg-pink-600 text-white rounded-xl transition-all">
                <i class="fa-solid fa-star w-5"></i> Skills
            </a>
            <a href="/admin/experience" class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                <i class="fa-solid fa-briefcase w-5"></i> Experience
            </a>
            <a href="/admin/projects" class="flex items-center gap-3 px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-xl transition-all">
                <i class="fa-solid fa-folder-open w-5"></i> Projects
            </a>
        </nav>
        <hr class="border-slate-800 my-4">
        <a href="/" class="text-xs text-slate-400 hover:text-white transition-colors pl-4">← Lihat Website Utama</a>
    </div>

    <div class="flex-1 p-10 space-y-8 overflow-y-auto h-screen">
        <div>
            <h1 class="text-3xl font-extrabold text-zinc-800 tracking-tight">Kelola Keahlian (Skills)</h1>
            <p class="text-sm text-zinc-500 mt-1">Tambahkan teknologi atau keahlian analisis data baru yang Anda kuasai ke portofolio.</p>
        </div>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            <div class="bg-white p-6 rounded-2xl border border-pink-100/70 shadow-sm space-y-5">
                <h3 class="text-lg font-bold text-zinc-800 flex items-center gap-2 border-b border-zinc-100 pb-3">
                    <i class="fa-regular fa-square-plus text-pink-500"></i> Tambah Skill Baru
                </h3>
                
                <form id="form-skill" onsubmit="event.preventDefault(); tambahSkill();" class="space-y-4">
                    <div class="space-y-1">
                        <label class="block text-xs font-bold text-zinc-400 uppercase tracking-wider mb-1.5">Nama Keahlian / Teknologi</label>
                        <input type="text" id="input-skill" required placeholder="Contoh: Java, Python, Tailwind CSS, SQL" 
                            class="w-full px-4 py-3 border border-zinc-200 bg-zinc-50/50 rounded-xl focus:outline-none focus:border-pink-400 focus:bg-white text-sm text-zinc-800 transition-all focus:ring-4 focus:ring-pink-100">
                    </div>
                    
                    <button type="submit" class="w-full py-3.5 bg-pink-500 text-white text-sm font-bold rounded-xl hover:bg-pink-600 transition-all shadow-md shadow-pink-100 cursor-pointer flex items-center justify-center gap-2">
                        <i class="fa-solid fa-plus text-xs"></i> Tambah Keahlian
                    </button>
                </form>
            </div>
            <div class="space-y-4">
                <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest pl-2">Daftar Keahlian Aktif (CRUD)</h3>
                <div id="container-skills-admin" class="grid grid-cols-1 gap-3 max-h-[450px] overflow-y-auto pr-2">
                    <div class="bg-white p-4 rounded-xl border border-pink-100/80 shadow-xs flex justify-between items-center hover:shadow-sm transition-all duration-200">
                        <div class="flex items-center space-x-3">
                            <i class="fa-brands fa-html5 text-orange-500 text-xl w-6 text-center"></i>
                            <span class="font-semibold text-sm text-zinc-700">HTML</span>
                        </div>
                        <button class="px-3 py-1.5 bg-rose-600 text-white text-xs font-bold rounded-lg hover:bg-rose-700 transition cursor-pointer flex items-center gap-1">
                            <i class="fa-solid fa-trash text-[10px]"></i> Hapus
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
<script>
       
        const API_URL = 'http://127.0.0.1:5000';
    </script>
    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/skills.js"></script>
</body>
</html>
