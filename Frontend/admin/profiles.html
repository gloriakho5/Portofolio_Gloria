<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kelola Profil - Admin</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 flex min-h-screen">

    <div class="w-64 bg-slate-900 text-slate-300 p-6 flex flex-col space-y-2 h-screen sticky top-0 shadow-xl">
        <h2 class="text-white text-xl font-bold mb-6 flex items-center gap-2"><i class="fa-solid fa-sliders text-blue-500"></i> Panel Admin</h2>
        <a href="/admin/dashboard" class="px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-colors text-sm">Dashboard</a>
        <a href="/admin/profiles" class="px-4 py-2.5 bg-blue-600 rounded-xl text-white font-semibold text-sm shadow-md">Profil</a>
        <a href="/admin/skills" class="px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-colors text-sm">Skills</a>
        <a href="/admin/experience" class="px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-colors text-sm">Experience</a>
        <a href="/admin/projects" class="px-4 py-2.5 rounded-xl hover:bg-slate-800 transition-colors text-sm">Projects</a>
        <hr class="border-slate-800 my-4">
        <a href="/" class="text-xs text-slate-400 hover:text-white transition-colors pl-4">← Lihat Website</a>
    </div>

    <div class="flex-1 p-10 max-w-3xl space-y-6">
        <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Perbarui Data Profil</h1>
        
        <div class="bg-white p-8 rounded-2xl border border-slate-200/60 shadow-sm space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
                <input type="text" id="input-nama" placeholder="Masukkan nama lengkap" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-slate-800 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Peran / Bidang Keahlian</label>
                <input type="text" id="input-peran" placeholder="Contoh: Mahasiswa Sistem Informasi / Data Analyst" class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-slate-800 text-sm">
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Bio Singkat</label>
                <textarea id="input-bio" rows="4" placeholder="Tulis biografi singkat Anda di sini..." class="w-full px-4 py-3 border border-slate-200 rounded-xl focus:outline-none focus:border-blue-600 bg-white text-slate-800 text-sm resize-none"></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Upload Foto Profil</label>
                <div class="flex gap-3">
                    <input type="file" id="file-foto" accept="image/*" class="flex-1 border border-slate-200 p-2 rounded-xl bg-slate-50/50 text-sm file:mr-4 file:py-1 file:px-3 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-600">
                    <button type="button" onclick="uploadGambar()" class="px-5 py-2 bg-slate-800 text-white font-medium rounded-xl text-sm hover:bg-slate-700 transition-colors cursor-pointer">Upload</button>
                </div>
                <input type="text" id="input-url-foto" readonly placeholder="URL Gambar Otomatis Terisi Seteleh Upload" class="w-full mt-3 px-4 py-3 border border-slate-100 bg-slate-50 rounded-xl text-slate-500 text-xs focus:outline-none">
            </div>
            <button onclick="simpanProfil()" class="w-full py-3.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-md transition-all cursor-pointer">Simpan Perubahan Profil</button>
        </div>
    </div>

    <script src="/admin/js/api.js"></script>
    <script src="/admin/js/profiles.js"></script>
    <script>
        // Ambil data profil otomatis saat halaman dibuka agar user tidak mengetik dari awal
        window.onload = async () => {
            try {
                const res = await fetch(`${API_URL}/api/profile`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.nama) {
                        document.getElementById('input-nama').value = data.nama;
                        document.getElementById('input-peran').value = data.peran || '';
                        document.getElementById('input-bio').value = data.bio || '';
                        document.getElementById('input-url-foto').value = data.foto || '';
                    }
                }
            } catch (err) { console.error("Gagal memuat profil awal:", err); }
        };

        async function uploadGambar() {
            const fileInput = document.getElementById('file-foto');
            if (fileInput.files.length === 0) { alert('Pilih file gambar terlebih dahulu!'); return; }
            
            const btn = document.querySelector("button[onclick='uploadGambar()']");
            btn.innerText = "Processing...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            try {
                const res = await fetch(`${API_URL}/api/upload`, { method: 'POST', body: formData });
                const hasil = await res.json();
                if (res.ok) {
                    document.getElementById('input-url-foto').value = hasil.url;
                    alert('Foto sukses terunggah ke Cloudinary!');
                } else {
                    alert('Gagal: ' + hasil.pesan);
                }
            } catch (err) { console.error(err); alert('Terjadi kesalahan jaringan.'); }
            finally { btn.innerText = "Upload"; btn.disabled = false; }
        }
    </script>
</body>
</html>
